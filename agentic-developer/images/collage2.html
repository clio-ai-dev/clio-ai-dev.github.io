<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
body { margin: 0; padding: 0; background: white; width: 600px; height: 600px; overflow: hidden; }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 6px;
  padding: 6px;
  width: 600px;
  height: 600px;
  box-sizing: border-box;
}
.cell {
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.cell img { width: 100%; height: 100%; object-fit: cover; }
</style></head><body>
<div class="grid">
<div class="cell"><img src="vg-09.jpg"></div>
<div class="cell"><img src="img-03-01-v2.jpg"></div>
<div class="cell"><img src="vg-14.jpg"></div>
<div class="cell"><img src="vg-25.jpg"></div>
<div class="cell"><img src="img-02-01-v2.jpg"></div>
<div class="cell"><img src="vg-19.jpg"></div>
</div>
</body></html>
